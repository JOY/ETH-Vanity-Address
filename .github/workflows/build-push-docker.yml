name: Publish Docker Image

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: Build and Push (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            tag_suffix: ""
          - variant: gpu
            dockerfile: Dockerfile.gpu
            tag_suffix: "-gpu"
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image tags
        id: prep
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG_SUFFIX: ${{ matrix.tag_suffix }}
        run: |
          set -eu
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_name="eth-vanity-address"
          version="${GITHUB_REF_NAME:-${GITHUB_SHA::7}}"
          suffix="${TAG_SUFFIX}"

          {
            echo "tags<<EOF"
            echo "ghcr.io/${owner_lc}/${image_name}:latest${suffix}"
            echo "ghcr.io/${owner_lc}/${image_name}:${version}${suffix}"
            if [ -n "${DOCKERHUB_USERNAME}" ]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/${image_name}:latest${suffix}"
              echo "docker.io/${DOCKERHUB_USERNAME}/${image_name}:${version}${suffix}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ env.GHCR_USER == '' || env.GHCR_TOKEN == '' }}
        env:
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR (PAT)
        if: ${{ env.GHCR_USER != '' && env.GHCR_TOKEN != '' }}
        env:
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USER }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DH_USER != '' && env.DH_TOKEN != '' }}
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DH_USER }}
          password: ${{ env.DH_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.prep.outputs.tags }}
